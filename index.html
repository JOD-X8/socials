<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JOD ✦</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Playfair+Display:ital,wght@1,400;1,500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
@media(pointer:fine){*{cursor:none!important;}}

#cur{width:8px;height:8px;background:#ff1e1e;border-radius:50%;position:fixed;z-index:999999;pointer-events:none;transform:translate(-50%,-50%);box-shadow:0 0 14px rgba(255,30,30,0.9);}
#cur-ring{width:34px;height:34px;border:1px solid rgba(255,30,30,0.4);border-radius:50%;position:fixed;z-index:999998;pointer-events:none;transform:translate(-50%,-50%);transition:width .2s ease,height .2s ease;}
#cur.hover{transform:translate(-50%,-50%) scale(2);}
#cur-ring.hover{width:55px;height:55px;border-color:rgba(255,30,30,0.9);}

:root{--red:#ff1e1e;--red2:#8b0000;--white:#e8f4ff;--dark:#010714;}

/* VIDEO BG */
#vbg{position:fixed;inset:0;z-index:0;background:var(--dark);}
#vbg video{width:100%;height:100%;object-fit:cover;opacity:0.58;filter:saturate(1.15) brightness(1.08) contrast(1.08);}
#vbg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 40%,rgba(180,0,0,0.07) 0%,transparent 70%);pointer-events:none;}

/* AURORA BLOBS */
#aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.aurora-blob{position:absolute;border-radius:50%;filter:blur(90px);animation:blobFloat 12s ease-in-out infinite alternate;will-change:transform,opacity;}
.aurora-blob:nth-child(1){width:55vw;height:45vw;top:-10%;left:-10%;background:radial-gradient(ellipse,rgba(255,30,30,0.18) 0%,transparent 70%);animation-duration:14s;}
.aurora-blob:nth-child(2){width:45vw;height:40vw;bottom:-8%;right:-5%;background:radial-gradient(ellipse,rgba(255,60,60,0.15) 0%,transparent 70%);animation-duration:11s;animation-delay:-4s;}
.aurora-blob:nth-child(3){width:35vw;height:35vw;top:40%;left:40%;background:radial-gradient(ellipse,rgba(140,0,0,0.1) 0%,transparent 70%);animation-duration:16s;animation-delay:-7s;}
@keyframes blobFloat{0%{transform:translate(0,0) scale(1);}50%{transform:translate(3vw,-4vh) scale(1.08);}100%{transform:translate(-2vw,3vh) scale(0.96);}}

/* SCANLINES */
#scanlines{position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);opacity:0.18;}
.grain{position:fixed;inset:0;z-index:1;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:0.25;}

#eyeCanvas{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.4;}
#pCanvas{position:fixed;inset:0;z-index:1;pointer-events:none;}
#bloodCanvas{position:fixed;inset:0;z-index:1;pointer-events:none;}

/* ═══ TAP TO START — full red theme ═══ */
#tap-start{
  position:fixed;inset:0;z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:28px;
  background:rgba(1,3,8,0.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  transition:opacity .7s ease;
}
/* big glowing ring behind pfp */
#tap-pfp-ring{
  position:relative;
  width:130px;height:130px;
  display:flex;align-items:center;justify-content:center;
}
#tap-pfp-ring::before{
  content:'';
  position:absolute;inset:-8px;
  border-radius:50%;
  background:conic-gradient(from 0deg,#ff1e1e,#7a0000,#ff4444,#ff1e1e);
  animation:spinRing 3s linear infinite;
  z-index:0;
}
#tap-pfp-ring::after{
  content:'';
  position:absolute;inset:-8px;
  border-radius:50%;
  box-shadow:0 0 30px rgba(255,30,30,0.7),0 0 60px rgba(255,30,30,0.3),inset 0 0 30px rgba(255,30,30,0.1);
  z-index:0;
  animation:ringPulse 2s ease-in-out infinite;
}
@keyframes spinRing{to{transform:rotate(360deg);}}
@keyframes ringPulse{0%,100%{box-shadow:0 0 30px rgba(255,30,30,0.6),0 0 60px rgba(255,30,30,0.25);}50%{box-shadow:0 0 50px rgba(255,30,30,0.9),0 0 90px rgba(255,30,30,0.45);}}
#tap-pfp-img{
  width:116px;height:116px;
  border-radius:50%;object-fit:cover;
  position:relative;z-index:1;
  border:3px solid #010308;
}
/* name on welcome */
#tap-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(2.2rem,8vw,4.5rem);
  letter-spacing:.2em;
  background:linear-gradient(165deg,#ffffff 0%,#ff4d4d 40%,#ff1e1e 70%,#7a0000 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 28px rgba(255,0,0,0.6));
  line-height:1;
}
#tap-tagline{
  font-family:'Space Mono',monospace;
  font-size:.62rem;letter-spacing:.3em;text-transform:uppercase;
  color:rgba(255,100,100,0.45);
  margin-top:-10px;
}
#tap-start-btn{
  display:flex;align-items:center;gap:10px;
  padding:13px 38px;
  background:rgba(255,30,30,0.08);
  border:1px solid rgba(255,30,30,0.45);
  border-radius:40px;
  color:#ffbbbb;
  font-family:'Space Mono',monospace;
  font-size:.75rem;letter-spacing:.25em;text-transform:uppercase;
  animation:redPulse 1.8s ease-in-out infinite;
  cursor:pointer;
  transition:background .2s,border-color .2s;
}
#tap-start-btn:hover{background:rgba(255,30,30,0.18);border-color:rgba(255,30,30,0.8);}
@keyframes redPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,30,30,0.35)}50%{box-shadow:0 0 0 16px rgba(255,30,30,0)}}
#tap-start p{font-family:'Space Mono',monospace;font-size:.55rem;color:rgba(255,80,80,.25);letter-spacing:.15em;text-transform:uppercase;}
#tap-start.hidden{opacity:0;pointer-events:none;}

/* MUTE BTN */
#mute-btn{
  position:fixed;right:22px;bottom:22px;
  z-index:99999;width:44px;height:44px;
  border:1px solid rgba(255,30,30,0.35);border-radius:12px;
  background:rgba(20,4,4,0.82);color:rgba(255,120,120,0.9);
  font-size:1.05rem;cursor:pointer;pointer-events:auto;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:0 0 14px rgba(255,30,30,0.15),inset 0 1px 0 rgba(255,80,80,0.08);
  transition:transform .2s,box-shadow .2s,border-color .2s,background .2s;
}
#mute-btn:hover{transform:scale(1.1);border-color:rgba(255,30,30,0.7);background:rgba(40,6,6,0.92);box-shadow:0 0 22px rgba(255,30,30,0.4);}

/* LAYOUT */
#app{position:relative;z-index:2;width:100%;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-bottom:140px;padding-top:70px;}

/* STATUS PILL */
#status-pill{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:8px;
  padding:7px 18px 7px 14px;
  background:rgba(15,3,3,0.78);border:1px solid rgba(255,30,30,0.2);border-radius:40px;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;
  color:var(--white);white-space:nowrap;z-index:10;
  animation:pillDrop .8s cubic-bezier(.34,1.56,.64,1) both;
}
.pill-dot{width:8px;height:8px;border-radius:50%;background:#747f8d;transition:background .4s,box-shadow .4s;flex-shrink:0;}
.pill-dot.online{background:#3ba55d;box-shadow:0 0 8px #3ba55d;}
.pill-dot.idle{background:#faa81a;box-shadow:0 0 8px #faa81a;}
.pill-dot.dnd{background:#ed4245;box-shadow:0 0 8px #ed4245;}
.pill-dot.offline{background:#747f8d;}
@keyframes pillDrop{from{opacity:0;transform:translateX(-50%) translateY(-16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* HERO */
.hero{text-align:center;animation:heroIn 1.1s cubic-bezier(.16,1,.3,1) both;animation-delay:.25s;}
@keyframes heroIn{from{opacity:0;transform:scale(.93) translateY(22px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* ═══ PROFILE PIC — hexagonal clip with rotating dashed border ═══ */
#pfp-wrap{
  position:relative;
  width:116px;height:116px;
  margin:0 auto 18px;
  display:flex;align-items:center;justify-content:center;
}
/* Outer rotating dashed ring */
#pfp-wrap::before{
  content:'';
  position:absolute;inset:-10px;
  border-radius:50%;
  border:2px dashed rgba(255,30,30,0.55);
  animation:dashSpin 8s linear infinite;
}
/* Inner solid glow ring */
#pfp-wrap::after{
  content:'';
  position:absolute;inset:-3px;
  border-radius:50%;
  border:1.5px solid rgba(255,60,60,0.35);
  box-shadow:0 0 18px rgba(255,30,30,0.45),0 0 40px rgba(255,30,30,0.15),inset 0 0 12px rgba(255,30,30,0.08);
  animation:glowBreathe 3s ease-in-out infinite;
}
@keyframes dashSpin{to{transform:rotate(360deg);}}
@keyframes glowBreathe{0%,100%{box-shadow:0 0 18px rgba(255,30,30,0.45),0 0 40px rgba(255,30,30,0.15);}50%{box-shadow:0 0 28px rgba(255,30,30,0.7),0 0 60px rgba(255,30,30,0.3);}}
#pfp{
  width:110px;height:110px;
  border-radius:50%;object-fit:cover;
  border:2px solid rgba(10,2,2,1);
  position:relative;z-index:1;display:block;
  transition:transform .3s ease;
  box-shadow:0 6px 28px rgba(0,0,0,0.7);
}
#pfp:hover{transform:scale(1.05);}

/* JOD NAME */
.big-name{
  font-family:'Bebas Neue',sans-serif;font-size:clamp(3.5rem,10vw,9rem);line-height:.88;letter-spacing:.12em;text-transform:uppercase;
  background:linear-gradient(165deg,#ffffff 0%,#ff4d4d 35%,#ff1e1e 65%,#7a0000 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 40px rgba(255,0,0,0.55));
}
.big-name:hover{animation:glitch .38s steps(2,end) both;}
@keyframes glitch{
  0%{text-shadow:none;transform:translate(0)}
  20%{text-shadow:-2px 0 #0af,2px 0 #06f;transform:translate(-1px,1px)}
  40%{text-shadow:2px 0 #0af,-2px 0 #06f;transform:translate(1px,-1px)}
  60%{text-shadow:-2px 0 #0af,2px 0 #06f;transform:translate(0,1px)}
  80%{text-shadow:2px 0 #0af,-2px 0 #06f;transform:translate(1px,0)}
  100%{text-shadow:none;transform:translate(0)}
}

/* RUNNING APP STATUS */
.running-app-status{
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:10px;padding:6px 16px;
  background:rgba(255,30,30,0.08);border:1px solid rgba(255,30,30,0.2);border-radius:30px;
  backdrop-filter:blur(10px);animation:fadeInUp .5s ease both;
}
.running-app-icon{font-size:.9rem;}
.running-app-text{
  font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.1em;
  color:rgba(255,160,160,.9);text-transform:uppercase;
  max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
@keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* GLOWING RED DIVIDER */
.red-glow-divider{
  width:180px;height:1px;margin:16px auto 14px;
  background:linear-gradient(90deg,transparent,#ff1e1e 30%,#ff4444 50%,#ff1e1e 70%,transparent);
  box-shadow:0 0 8px rgba(255,30,30,0.9),0 0 18px rgba(255,30,30,0.6),0 0 32px rgba(255,30,30,0.3);
  border-radius:2px;animation:dividerPulse 2.4s ease-in-out infinite;
}
@keyframes dividerPulse{
  0%,100%{box-shadow:0 0 8px rgba(255,30,30,0.9),0 0 18px rgba(255,30,30,0.6),0 0 32px rgba(255,30,30,0.3);opacity:1;}
  50%{box-shadow:0 0 14px rgba(255,30,30,1),0 0 28px rgba(255,30,30,0.8),0 0 50px rgba(255,30,30,0.5);opacity:.85;}
}

/* TYPEWRITER */
.typewriter{
  font-family:'Playfair Display',Georgia,serif;font-style:italic;font-weight:400;
  font-size:clamp(.9rem,2.4vw,1.15rem);
  color:rgba(255,180,180,0.75);margin-top:18px;height:1.6em;letter-spacing:.04em;
  text-shadow:0 0 28px rgba(255,60,60,0.4),0 2px 8px rgba(0,0,0,0.5);
}
.blink-cur{display:inline-block;width:2px;height:.85em;background:#ff1e1e;margin-left:3px;vertical-align:middle;animation:blink .7s step-end infinite;}
@keyframes blink{50%{opacity:0}}

/* SOCIALS */
#socials{position:fixed;bottom:10px;left:0;right:0;z-index:10;display:flex;justify-content:center;padding:0 12px;pointer-events:none;}
.socials-inner{display:flex;gap:10px;pointer-events:all;overflow-x:auto;scrollbar-width:none;padding:18px 10px 14px;max-width:100%;animation:barUp .9s cubic-bezier(.34,1.56,.64,1) both;animation-delay:.4s;}
.socials-inner::-webkit-scrollbar{display:none;}
@keyframes barUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

.soc{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;
  width:96px;height:108px;flex-shrink:0;text-decoration:none;color:var(--white);
  background:rgba(22,4,4,0.62);border:1px solid rgba(255,30,30,0.18);border-radius:20px;
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  box-shadow:0 4px 28px rgba(0,0,0,0.45),inset 0 1px 0 rgba(255,80,80,0.06);
  position:relative;overflow:hidden;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),border-color .25s,box-shadow .25s,background .25s;
}
.soc::before{content:'';position:absolute;top:0;left:12%;right:12%;height:1.5px;background:linear-gradient(90deg,transparent,var(--c,#ff1e1e),transparent);opacity:0;transition:opacity .28s;border-radius:4px;}
.soc:hover::before{opacity:1;}
.soc:hover{transform:translateY(-7px) scale(1.05);border-color:rgba(255,30,30,0.5);box-shadow:0 10px 36px rgba(0,0,0,0.5),0 0 26px rgba(255,30,30,0.3);background:rgba(40,6,6,0.78);}
.soc:hover .soc-icon svg{transform:translateY(-2px) scale(1.12);filter:drop-shadow(0 0 9px var(--c,#ff1e1e));}
.soc-icon svg{width:24px;height:24px;transition:transform .28s,filter .28s;display:block;}
.soc-name{font-size:.59rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:rgba(255,120,120,.58);transition:color .2s;}
.soc-sub{font-size:.54rem;color:rgba(200,80,80,.42);transition:color .2s;white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis;}
.soc:hover .soc-name{color:rgba(255,210,210,.95);}
.soc:hover .soc-sub{color:rgba(255,180,180,.8);}

.soc-yt{--c:#ff0000;}
.soc-ig{--c:#e1306c;}
.soc-dc{--c:#7289da;}
.soc-rblx{--c:#e24434;}
.soc-gh{--c:#c8d1dc;}
.soc-sp{--c:#1ed760;}
.soc-xbox{--c:#107c10;}

@media(max-width:650px){
  #app{padding-bottom:110px;padding-top:60px;}
  #socials{bottom:10px;padding:0 6px;}
  .socials-inner{gap:6px;padding:14px 6px 12px;}
  .soc{padding:13px 11px 11px;min-width:62px;border-radius:15px;}
  .soc-sub{display:none;}
  .soc-icon svg{width:20px;height:20px;}
  .soc-name{font-size:.52rem;letter-spacing:.08em;}
}
@media(max-width:400px){
  .soc{padding:11px 7px 10px;min-width:48px;}
  .soc-icon svg{width:18px;height:18px;}
}
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur-ring"></div>

<!-- TAP TO START — red themed with pfp -->
<div id="tap-start">
  <div id="tap-pfp-ring">
    <img id="tap-pfp-img" src="https://api.lanyard.rest/1135040388357427293.png" alt="JOD"/>
  </div>
  <div id="tap-name">JOD</div>
  <div id="tap-tagline">different ✦</div>
  <div id="tap-start-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ff4444" stroke-width="2.2" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    ENTER
  </div>
  <p>click anywhere to continue</p>
</div>

<!-- VIDEO BG -->
<div id="vbg">
  <video loop playsinline preload="auto" id="bgvid" muted>
    <source src="bg.mp4" type="video/mp4"/>
  </video>
</div>

<!-- AURORA BLOBS -->
<div id="aurora">
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
</div>

<div id="scanlines"></div>
<div class="grain"></div>
<canvas id="eyeCanvas"></canvas>
<canvas id="pCanvas"></canvas>
<canvas id="bloodCanvas"></canvas>

<div id="app">
  <div id="status-pill">
    <span class="pill-dot" id="pill-dot"></span>
    <span id="pill-text">DISCORD · OFFLINE</span>
  </div>

  <div class="hero">
    <!-- PFP -->
    <div id="pfp-wrap">
      <img id="pfp" src="https://api.lanyard.rest/1135040388357427293.png" alt="JOD"/>
    </div>

    <!-- NAME -->
    <div class="big-name">JOD</div>

    <!-- RUNNING APP STATUS -->
    <div id="running-app-status" class="running-app-status" style="display:none;">
      <span id="running-app-icon" class="running-app-icon"></span>
      <span id="running-app-text" class="running-app-text"></span>
    </div>

    <!-- GLOWING RED DIVIDER -->
    <div class="red-glow-divider"></div>

    <!-- TYPEWRITER -->
    <div class="typewriter">
      <span id="tw-text"></span>
      <span class="blink-cur"></span>
    </div>
  </div>
</div>

<!-- SOCIALS -->
<div id="socials">
  <div class="socials-inner">

    <a href="https://www.youtube.com/@Zawk-x" target="_blank" class="soc soc-yt">
      <span class="soc-icon"><svg viewBox="0 0 24 24" fill="#FF0000"><path d="M21.6 7.2s-.21-1.4-.83-2.03C19.97 4.3 19.1 4.3 18.7 4.25 16.67 4.1 13.5 4.1 13.5 4.1h-.01s-3.17 0-5.2.15c-.4.05-1.26.05-2.07.92C5.6 5.8 5.4 7.2 5.4 7.2S5.2 8.83 5.2 10.46v1.53c0 1.62.2 3.25.2 3.25s.2 1.4.82 2.03c.8.87 1.85.84 2.31.93 1.68.16 7.13.21 7.13.21s3.17 0 5.2-.16c.4-.05 1.27-.05 2.07-.92.62-.63.83-2.03.83-2.03s.2-1.62.2-3.25v-1.53c0-1.63-.2-3.26-.2-3.26zM10.23 14.6V9.22l5.58 2.7-5.58 2.68z"/></svg></span>
      <span class="soc-name">YouTube</span>
      <span class="soc-sub">Zawk</span>
    </a>

    <a href="https://www.instagram.com/zawk.x/" target="_blank" class="soc soc-ig">
      <span class="soc-icon"><svg viewBox="0 0 24 24" fill="none"><defs><linearGradient id="ig" x1="0" y1="1" x2="1" y2="0"><stop offset="0%" stop-color="#f09433"/><stop offset="50%" stop-color="#dc2743"/><stop offset="100%" stop-color="#bc1888"/></linearGradient></defs><rect x="2" y="2" width="20" height="20" rx="6" stroke="url(#ig)" stroke-width="2"/><circle cx="12" cy="12" r="4" stroke="url(#ig)" stroke-width="2"/><circle cx="17.5" cy="6.5" r="1.2" fill="url(#ig)"/></svg></span>
      <span class="soc-name">Instagram</span>
      <span class="soc-sub">JOD</span>
    </a>

    <a href="https://discord.gg/bY9DwUaJ" target="_blank" class="soc soc-dc">
      <span class="soc-icon"><svg viewBox="0 0 24 24" fill="#7289DA"><path d="M20.3 4.4A19.7 19.7 0 0015 3a13.2 13.2 0 00-.6 1.2 18.3 18.3 0 00-4.8 0A13 13 0 009 3a19.8 19.8 0 00-5.3 1.4A20.6 20.6 0 001 17.6a19.9 19.9 0 005.9 2.9 14.8 14.8 0 001.3-2 12.9 12.9 0 01-2-.9l.5-.4a14.3 14.3 0 0012.6 0l.5.4a12.9 12.9 0 01-2 .9 14.7 14.7 0 001.3 2A19.8 19.8 0 0023 17.6a20.5 20.5 0 00-2.7-13.2zM8.7 15a2.1 2.1 0 110-4.2A2.1 2.1 0 018.7 15zm6.6 0a2.1 2.1 0 110-4.2 2.1 2.1 0 010 4.2z"/></svg></span>
      <span class="soc-name">Discord</span>

<script>
const CFG = {
  discordId: "1135040388357427293",
  typewriterLines: [
    "18 • Coder • Scripter",
    "Limitless.",
    "Grinding leet code at 3AM.",
    "Moderation.",
    "different ✦",
  ]
};

/* CURSOR */
const cur = document.getElementById('cur');
const ring = document.getElementById('cur-ring');
let x=0,y=0,rx=0,ry=0;
document.addEventListener("mousemove",(e)=>{
  x=e.clientX; y=e.clientY;
  const hover=e.target.closest("a,button");
  cur.classList.toggle("hover",!!hover);
  ring.classList.toggle("hover",!!hover);
});
(function animCursor(){
  rx+=(x-rx)*0.12; ry+=(y-ry)*0.12;
  cur.style.left=x+"px"; cur.style.top=y+"px";
  ring.style.left=rx+"px"; ring.style.top=ry+"px";
  requestAnimationFrame(animCursor);
})();

/* TAP TO START */
const vid   = document.getElementById('bgvid');
const tapEl = document.getElementById('tap-start');
let started = false;
function startExperience(){
  if(started) return; started=true;
  tapEl.classList.add('hidden');
  setTimeout(()=>tapEl.remove(),700);
  vid.muted=false; vid.volume=0.85;
  vid.play().catch(()=>{ vid.muted=true; vid.play().catch(()=>{}); });
}
tapEl.addEventListener('click', startExperience);
tapEl.addEventListener('touchend', e=>{ e.preventDefault(); startExperience(); });
vid.muted=true; vid.play().catch(()=>{});

/* MUTE */
const muteBtn = document.getElementById("mute-btn");
muteBtn.addEventListener("click",()=>{
  vid.muted=!vid.muted;
  muteBtn.textContent=vid.muted?"🔇":"🔊";
});

/* TYPEWRITER */
const twEl=document.getElementById('tw-text');
let twI=0,twC=0,twD=1,twT;
function twTick(){
  const line=CFG.typewriterLines[twI];
  if(twD===1){ twC++; twEl.textContent=line.slice(0,twC); if(twC>=line.length){twD=-1;clearInterval(twT);setTimeout(()=>{twT=setInterval(twTick,40);},2000);return;} }
  else{ twC--; twEl.textContent=line.slice(0,twC); if(twC<=0){twD=1;twI=(twI+1)%CFG.typewriterLines.length;clearInterval(twT);setTimeout(()=>{twT=setInterval(twTick,55);},300);return;} }
}
twT=setInterval(twTick,55);

/* RINGS CANVAS */
(function(){
  const cv=document.getElementById('eyeCanvas'),ctx=cv.getContext('2d');
  let W,H;
  const resize=()=>{W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;};
  window.addEventListener('resize',resize);resize();
  let t=0;
  (function draw(){
    ctx.clearRect(0,0,W,H);
    const ox=W/2,oy=H/2;
    [0,1,2].forEach(i=>{
      const r=Math.min(W,H)*(.27+i*.19);
      ctx.save();ctx.translate(ox,oy);ctx.rotate(t*(i%2===0?1:-1)*0.0003*100);
      const segs=60+i*20;ctx.beginPath();
      for(let s=0;s<segs;s++){const a1=(s/segs)*Math.PI*2,a2=a1+Math.PI*2/segs*.38;ctx.moveTo(Math.cos(a1)*r,Math.sin(a1)*r);ctx.arc(0,0,r,a1,a2);}
      ctx.strokeStyle=`rgba(180,20,20,${.032+i*.01})`;ctx.lineWidth=1;ctx.stroke();ctx.restore();
    });
    t++;requestAnimationFrame(draw);
  })();
})();

/* PARTICLES */
(function(){
  const cv=document.getElementById('pCanvas'),ctx=cv.getContext('2d');
  let W,H;
  const resize=()=>{W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;};
  window.addEventListener('resize',resize);resize();
  const pts=Array.from({length:55},()=>({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,vx:(Math.random()-.5)*.28,vy:(Math.random()-.5)*.28,r:Math.random()*.85+.2,a:Math.random()*.18+.04}));
  (function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,30,30,${p.a})`;ctx.fill();
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;
    });
    requestAnimationFrame(draw);
  })();
})();

/* ═══ BLOOD EMBER PARTICLES — floating upward ash/embers ═══ */
(function(){
  const cv=document.getElementById('bloodCanvas'),ctx=cv.getContext('2d');
  let W,H;
  const resize=()=>{W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;};
  window.addEventListener('resize',resize);resize();

  // Ember = small glowing particle that floats upward with a flicker
  const embers=[];
  const EMBER_COUNT=60;

  function makeEmber(){
    return{
      x: Math.random()*W,
      y: H + Math.random()*80,
      size: Math.random()*3.5+0.8,
      speedY: Math.random()*0.6+0.25,
      speedX: (Math.random()-.5)*0.4,
      life: 1.0,
      decay: Math.random()*0.003+0.001,
      flicker: Math.random()*Math.PI*2,
      flickerSpeed: Math.random()*0.08+0.03,
      // color: deep red to bright crimson
      r: Math.floor(Math.random()*80+160),
      g: Math.floor(Math.random()*20),
      b: 0,
    };
  }

  for(let i=0;i<EMBER_COUNT;i++){
    const e=makeEmber();
    e.y=Math.random()*H; // scatter initial y
    e.life=Math.random();
    embers.push(e);
  }

  (function draw(){
    ctx.clearRect(0,0,W,H);
    embers.forEach((e,i)=>{
      e.flicker+=e.flickerSpeed;
      const alpha=e.life*(0.55+Math.sin(e.flicker)*0.3);
      const s=e.size*(0.8+Math.sin(e.flicker*1.3)*0.2);

      // outer glow
      const grd=ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,s*3.5);
      grd.addColorStop(0,`rgba(${e.r},${e.g},${e.b},${alpha*0.9})`);
      grd.addColorStop(0.4,`rgba(${e.r},${e.g},${e.b},${alpha*0.3})`);
      grd.addColorStop(1,`rgba(${e.r},${e.g},${e.b},0)`);
      ctx.beginPath();ctx.arc(e.x,e.y,s*3.5,0,Math.PI*2);
      ctx.fillStyle=grd;ctx.fill();

      // bright core
      ctx.beginPath();ctx.arc(e.x,e.y,s*0.6,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,${Math.floor(e.g*2+60)},${e.b},${alpha})`;
      ctx.fill();

      // drift upward
      e.y-=e.speedY;
      e.x+=e.speedX+Math.sin(e.flicker*0.5)*0.15;
      e.life-=e.decay;

      // respawn when faded or off top
      if(e.life<=0||e.y<-20){
        embers[i]=makeEmber();
      }
    });
    requestAnimationFrame(draw);
  })();
})();

/* ═══ DISCORD via Lanyard ═══ */
const SM={online:'ONLINE',idle:'IDLE',dnd:'DO NOT DISTURB',offline:'OFFLINE'};
const CM={online:'online',idle:'idle',dnd:'dnd',offline:'offline'};

function applyStatus(status, act, appName, appEmoji){
  const dot=document.getElementById('pill-dot');
  const txt=document.getElementById('pill-text');
  if(dot) dot.className='pill-dot '+(CM[status]||'offline');
  if(txt) txt.textContent='DISCORD · '+(SM[status]||status.toUpperCase());

  const runEl=document.getElementById('running-app-status');
  const runIcon=document.getElementById('running-app-icon');
  const runText=document.getElementById('running-app-text');
  if(runEl){
    if(appName){
      runIcon.textContent=appEmoji||'🎮';
      runText.textContent=appName;
      runEl.style.display='flex';
    } else {
      runEl.style.display='none';
    }
  }

  const dcSub=document.getElementById('soc-dc-sub');
  if(dcSub&&act) dcSub.textContent=act.slice(0,18);
}

function parseData(d){
  const status=["online","idle","dnd","offline"].includes(d.discord_status)?d.discord_status:"offline";
  let activity="",appName="",appEmoji="";

  // Spotify check
  if(d.listening_to_spotify&&d.spotify){
    activity=`🎵 ${d.spotify.song} — ${d.spotify.artist}`;
    appName=`${d.spotify.song} — ${d.spotify.artist}`;
    appEmoji="🎵";
    const spSub=document.getElementById('soc-sp-sub');
    if(spSub) spSub.textContent=d.spotify.song.slice(0,16)+(d.spotify.song.length>16?'…':'');
  }

  // Game / other activity (overrides spotify for running app)
  if(d.activities&&d.activities.length){
    const game=d.activities.find(a=>a.name!=="Spotify"&&a.type!==4);
    if(game){
      appEmoji=game.emoji?.name||"🎮";
      appName=game.name;
      if(game.details) appName+=` · ${game.details}`;
      activity=`${appEmoji} ${appName}`;
      const dcSub=document.getElementById('soc-dc-sub');
      if(dcSub) dcSub.textContent=game.name.slice(0,14)+(game.name.length>14?'…':'');
    }
    // Custom status fallback
    if(!appName){
      const custom=d.activities.find(a=>a.type===4);
      if(custom&&custom.state){
        activity=custom.state;
        appName=custom.state;
        appEmoji=custom.emoji?.name||"💬";
      }
    }
  }

  applyStatus(status,activity,appName,appEmoji);
}

function fetchL(){
  const id=CFG.discordId;
  fetch(`https://api.lanyard.rest/v1/users/${id}`)
    .then(r=>r.json())
    .then(j=>{ if(j.success&&j.data) parseData(j.data); else applyStatus('offline','','',''); })
    .catch(()=>applyStatus('offline','','',''));
}

function connectWS(){
  const id=CFG.discordId;
  let hb;
  function conn(){
    const ws=new WebSocket('wss://api.lanyard.rest/socket');
    ws.onmessage=e=>{
      const m=JSON.parse(e.data);
      if(m.op===1){
        hb=setInterval(()=>{ if(ws.readyState===1) ws.send(JSON.stringify({op:3})); },m.d.heartbeat_interval);
        ws.send(JSON.stringify({op:2,d:{subscribe_to_id:id}}));
      }
      if(m.op===0&&m.d) parseData(m.d);
    };
    ws.onclose=()=>{ clearInterval(hb); setTimeout(conn,4000); };
    ws.onerror=()=>ws.close();
  }
  conn();
}

fetchL();
connectWS();
</script>
